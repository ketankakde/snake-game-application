name: Deploy Infrastructure & Application

on:
  push:
    branches:
      - test

  workflow_dispatch: 

env:
  AWS_REGION: us-east-1
  TF_DIR: terraform
  SSH_USER: ubuntu

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        run: terraform plan

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve

      - name: Get EC2 Public IP
        id: ec2
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "PUBLIC_IP=$(terraform output -raw public_ip)" >> $GITHUB_ENV

      - name: Wait for EC2
        run: sleep 30

      - name: Configure SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_PRIVATE_KEY }}" > ~/.ssh/ec2.pem
          chmod 600 ~/.ssh/ec2.pem

      - name: Deploy Application
        run: |
          ssh -o StrictHostKeyChecking=no \
              -i ~/.ssh/ec2.pem \
              ${SSH_USER}@${PUBLIC_IP} << 'EOF'

          sudo apt-get install -y git

          if [ ! -d project ]; then
              git clone https://github.com/ketankakde/snake-game-application.git project
          fi

          cd project

          docker compose up -d --build
          EOF
